  - type: Features
    data:
      - name: Crude Oil Marketing
        description: >-
          Purchases and markets crude oil at the wellhead across multiple U.S.
          petroleum basins including the Gulf Coast, Eagle Ford Shale, Permian
          Basin, Bakken Shale, and Michigan.
      - name: Crude Oil Transportation
        description: >-
          Operates a fleet of over 260 tractor-trailers for the physical
          transportation of crude oil and petroleum products across the United
          States.
      - name: Crude Oil Terminalling And Storage
        description: >-
          Provides terminalling and storage services with approximately 425,000
          barrels of capacity across dock facilities and 112 pipeline inventory
          locations.
      - name: Specialty Chemical Transportation
        description: >-
          Through Firebird Bulk Carriers, provides bulk liquid transportation
          services for liquid chemicals and dry bulk commodities.
      - name: Off-Spec Fuel Recycling
        description: >-
          Through Phoenix Oil, provides recycling and repurposing services for
          off-spec fuels, lubricants, and chemicals.
      - name: Pipeline Operations
        description: >-
          Through Victoria Express Pipeline, operates pipeline infrastructure
          for crude oil transportation and delivery.
  - type: UseCases
    data:
      - name: Wellhead Crude Oil Purchase And Sale
        description: >-
          Energy producers and exploration companies can sell crude oil at the
          wellhead to Adams Resources for marketing and distribution across
          multiple U.S. basins.
      - name: Crude Oil Logistics And Delivery
        description: >-
          Refiners and end-users can contract Adams Resources for the
          transportation and delivery of crude oil from production sites to
          refineries or storage facilities.
      - name: Petroleum Product Storage
        description: >-
          Companies requiring temporary or long-term storage of crude oil and
          petroleum products can utilize Adams Resources terminalling
          capabilities.
      - name: Specialty Chemical Bulk Transport
        description: >-
          Chemical manufacturers and distributors can use Firebird Bulk
          Carriers for the safe transportation of liquid chemicals and dry bulk
          materials.
      - name: Off-Spec Fuel Management
        description: >-
          Refineries and industrial facilities can use Phoenix Oil services to
          recycle or repurpose off-spec fuels and lubricants rather than
          disposal.
