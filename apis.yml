name: Adams Resources & Energy
description: >-
  Adams Resources & Energy is a diversified energy company engaged in the
  marketing, transportation, terminalling, and storage of crude oil and other
  related petroleum products in select markets across the United States. Through
  its subsidiaries GulfMark Energy, Firebird Bulk Carriers, Phoenix Oil, and
  Victoria Express Pipeline, the company purchases approximately 90,000 barrels
  per day at the wellhead and operates over 260 tractor-trailers and 112
  pipeline inventory locations. Adams Resources & Energy serves multiple U.S.
  petroleum basins including the Gulf Coast, Eagle Ford Shale, Permian Basin,
  Bakken Shale, and Michigan, with over $1 billion in annual revenues and 400+
  employees.
